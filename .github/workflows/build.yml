name: Build Project

on:
  push:
    branches-ignore:
      - 'dependabot/**'
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  CodeAudits:
    uses: evanchooly/workflows/.github/workflows/code-audits.yml@master
    with:
      java: 17

  Build:
    uses: evanchooly/workflows/.github/workflows/build.yml@master
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    with:
      java: 17
      saveBuild: true

  Matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'
          server-id: central
          cache: maven

      - name: Setup JBang
        uses: jbangdev/setup-jbang@main

      - name: Find MongoDB versions
        id: mongo-versions
        run: |
          echo "mongo_versions=$( jbang .github/BuildMatrix.java )" >> $GITHUB_OUTPUT

      - name: Find Latest Driver version
        id: latest-driver-version
        run: |
          echo "latest_driver_version=$( jbang .github/DriverVersions.java latest)" >> $GITHUB_OUTPUT

      - name: Find Driver versions
        id: driver-versions
        run: |
          echo "driver_versions=$( jbang .github/DriverVersions.java all)" >> $GITHUB_OUTPUT

      - name: Is releasable branch
        id: releasable
        run: |
          if [ "${{ github.event.ref }}" == 'refs/heads/master' ] \
            || [ "${{ github.event.ref }}" == 'refs/heads/main' ] \
            || [[ "${{ github.event.ref }}" =~ ^refs/heads/[0-9]+\.[0-9]+\.x$ ]] \
            || [[ "${{ github.event.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+.[0-9]+$ ]]
          then
            echo "releasable=true" >> $GITHUB_OUTPUT
          else
            echo "releasable=false" >> $GITHUB_OUTPUT
          fi

      - name: Find Driver snapshot version
        id: driver-snapshot
        run: |
          echo "driver_snapshot=$( jbang .github/DriverSnapshot.java )" >> $GITHUB_OUTPUT

    outputs:
      driver_latest: ${{ steps.latest-driver-version.outputs.latest_driver_version }}
      driver_matrix: ${{ steps.driver-versions.outputs.driver_versions }}
      version_matrix: ${{ steps.mongo-versions.outputs.mongo_versions }}
      releasable: ${{ steps.releasable.outputs.releasable }}
      driver_snapshot: ${{ steps.driver-snapshot.outputs.driver_snapshot }}

  ServerTests:
    name: Server
    needs:
      - Build
      - Matrix
    strategy:
      fail-fast: false
      matrix:
        mongo: ${{ fromJson(needs.matrix.outputs.version_matrix) }}
    uses: evanchooly/workflows/.github/workflows/build.yml@master
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    with:
      java: 17
      reuseBuild: true
      archive-name: "${{matrix.mongo}}-${{github.run_id}}"
      maven-flags: "-e -Dmongodb=${{ matrix.mongo }}"

  DriversTests:
    name: Driver
    needs:
      - Build
      - Matrix
    strategy:
      fail-fast: false
      matrix:
        driver: ${{ fromJson(needs.matrix.outputs.driver_matrix) }}
        mapper: [ reflection, critter ]
        include:
          - driver: ${{ needs.matrix.outputs.driver_snapshot }}
            mapper: reflection
          - driver: ${{ needs.matrix.outputs.driver_snapshot }}
            mapper: critter
    uses: evanchooly/workflows/.github/workflows/build.yml@master
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    with:
      java: 17
      reuseBuild: true
      archive-name: "${{matrix.driver}}-${{github.run_id}}"
      maven-flags: "-e -Ddriver.version=${{ matrix.driver }} -Dmorphia.mapper=${{ matrix.mapper }}"
      optional: ${{ matrix.optional == true }}

  JdkTests:
    name: JDK
    needs:
      - Build
      - Matrix
    strategy:
      fail-fast: false
      matrix:
        java: [ 17, 21, 25 ]
        mapper: [ reflection, critter ]
    uses: evanchooly/workflows/.github/workflows/build.yml@master
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    with:
      java: 17
      reuseBuild: true
      archive-name: "${{matrix.mapper}}-${{matrix.java}}-${{github.run_id}}"
      maven-flags: "-e -Dmorphia.mapper=${{ matrix.mapper }}"

  Coverage:
    name: Coverage Report
    needs:
      - Build
      - Matrix
    strategy:
      fail-fast: false
      matrix:
        mapper: [ reflection, critter ]
    uses: evanchooly/workflows/.github/workflows/build.yml@master
    secrets:
      DEVELOCITY_ACCESS_KEY: ${{ secrets.DEVELOCITY_ACCESS_KEY }}
    with:
      java: 17
      reuseBuild: true
      archive-name: "test-coverage-${{matrix.mapper}}-${{github.run_id}}"
      maven-flags: "-e -Dmorphia.mapper=${{ matrix.mapper }} -Pcoverage"

  Release:
#    needs:
#      - Matrix
#      - CodeAudits
#      - ServerTests
#      - DriversTests
#      - JdkTests
    if: needs.Matrix.outputs.releasable == 'true'
    uses: evanchooly/workflows/.github/workflows/jreleaser.yml@master
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    with:
      java: 17
    secrets:
      GH_PUSH_TOKEN       : ${{ secrets.GH_PUSH_TOKEN }}
      MAVEN_GPG_PASSPHRASE      : ${{ secrets.MAVEN_GPG_PASSPHRASE }}
      GPG_PUBLIC_KEY      : ${{ secrets.GPG_PUBLIC_KEY }}
      GPG_PRIVATE_KEY     : ${{ secrets.GPG_PRIVATE_KEY }}
      SONATYPE_USERNAME   : ${{ secrets.SONATYPE_USERNAME }}
      SONATYPE_TOKEN   : ${{ secrets.SONATYPE_TOKEN }}

  Docs:
    name: Update Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - Release
    steps:
      - name: Re-enable the docs workflow
        run: gh --repo MorphiaOrg/morphia-docs workflow enable Docs || true
        env:
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
      - name: Invoke antora build
        run: gh workflow run Docs --repo MorphiaOrg/morphia-docs --ref master
        env:
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}

  Rewrite:
    name: Validate upgrade automation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - Release
    steps:
      - name: Re-enable the upgrade workflow
        run: gh --repo MorphiaOrg/morphia-upgrade-testing workflow enable Upgrades || true
        env:
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
      - name: Invoke build
        run: gh workflow run Upgrades --repo MorphiaOrg/morphia-upgrade-testing --ref main
        env:
          GH_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
