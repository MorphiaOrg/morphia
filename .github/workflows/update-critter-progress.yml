name: Update Critter Integration Progress

# Runs whenever a commit lands on master (including PR merges) or a tracked issue is edited.
# Recomputes phase and parent percentages using the formulas in docs/critter-integration-plan.md.

on:
  push:
    branches: [master]
  issues:
    types: [edited]
  workflow_dispatch:

jobs:
  update-progress:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    # Run on pushes to master, manual dispatch, or edits to the parent/phase issues only
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(
        fromJson('[4179, 4184, 4185, 4195, 4186, 4187, 4188, 4189, 4190]'),
        github.event.issue.number
      ))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Update issue percentages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/update-critter-progress.sh
